  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>
  <rect width="512" height="512" rx="96" ry="96" fill="none" stroke="#00ff80" stroke-width="3" opacity="0.15"/>

  <g filter="url(#glow)" fill="none" stroke="#00ff80" stroke-linecap="round">
    <arc/>
    <path d="M 152 256 A 104 104 0 0 1 360 256" stroke-width="14" opacity="0.35"/>
    <path d="M 182 256 A 74 74 0 0 1 330 256"  stroke-width="14" opacity="0.55"/>
    <path d="M 212 256 A 44 44 0 0 1 300 256"  stroke-width="14" opacity="0.80"/>

    <path d="M 152 256 A 104 104 0 0 0 360 256" stroke-width="14" opacity="0.20"/>
    <path d="M 182 256 A 74 74 0 0 0 330 256"  stroke-width="14" opacity="0.30"/>
    <path d="M 212 256 A 44 44 0 0 0 300 256"  stroke-width="14" opacity="0.45"/>
  </g>

  <circle cx="256" cy="256" r="22" fill="#00ff80" opacity="0.95" filter="url(#glow)"/>
  <circle cx="256" cy="256" r="10" fill="#090a0f"/>

  <text x="256" y="390" font-family="monospace" font-size="36" font-weight="bold" fill="#00ff80" text-anchor="middle" opacity="0.7" letter-spacing="4">BCB</text>
