<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="180" height="180">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#090a0f"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="180" height="180" rx="32" ry="32" fill="url(#bg)"/>
  <rect width="180" height="180" rx="32" ry="32" fill="none" stroke="#00ff80" stroke-width="1.5" opacity="0.15"/>

  <g filter="url(#glow)" fill="none" stroke="#00ff80" stroke-linecap="round">
    <path d="M 53 90 A 37 37 0 0 1 127 90" stroke-width="5" opacity="0.35"/>
    <path d="M 64 90 A 26 26 0 0 1 116 90" stroke-width="5" opacity="0.55"/>
    <path d="M 75 90 A 15 15 0 0 1 105 90" stroke-width="5" opacity="0.80"/>

    <path d="M 53 90 A 37 37 0 0 0 127 90" stroke-width="5" opacity="0.20"/>
    <path d="M 64 90 A 26 26 0 0 0 116 90" stroke-width="5" opacity="0.30"/>
    <path d="M 75 90 A 15 15 0 0 0 105 90" stroke-width="5" opacity="0.45"/>
  </g>

  <circle cx="90" cy="90" r="8" fill="#00ff80" opacity="0.95" filter="url(#glow)"/>
  <circle cx="90" cy="90" r="3.5" fill="#090a0f"/>

  <text x="90" y="138" font-family="monospace" font-size="13" font-weight="bold" fill="#00ff80" text-anchor="middle" opacity="0.7" letter-spacing="2">BCB</text>
